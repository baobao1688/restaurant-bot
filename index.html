    <script>
        const chatArea = document.getElementById('chatArea');
        const BOT_ID = '7629219190532014116';
        
        // 添加消息到聊天区
        function addMessage(content, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.innerHTML = `
                <div class="msg-avatar">${isUser ? '👤' : '🍜'}</div>
                <div class="msg-content">${content}</div>
            `;
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        // 发送到AI（通过Serverless Function代理）
        async function sendToAI(userMessage) {
            addMessage(userMessage, true);
            
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot';
            loadingMsg.id = 'loading';
            loadingMsg.innerHTML = `
                <div class="msg-avatar">🍜</div>
                <div class="msg-content">
                    <div class="loading">
                        <div class="loading-dots"><span></span><span></span><span></span></div>
                        AI分析中...
                    </div>
                </div>
            `;
            chatArea.appendChild(loadingMsg);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            try {
                // 步骤1: 创建对话
                const createRes = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: userMessage,
                        bot_id: BOT_ID
                    })
                });
                
                const createData = await createRes.json();
                console.log('创建对话响应:', createData);
                
                if (createData.code !== 0) {
                    throw new Error(createData.msg || 'API调用失败');
                }
                
                const chatId = createData.data.id;
                const conversationId = createData.data.conversation_id;
                
                // 步骤2: 轮询检查状态
                let result = '';
                for (let i = 0; i < 90; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    
                    const statusRes = await fetch('/api/chat-status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, conversation_id: conversationId })
                    });
                    
                    const statusData = await statusRes.json();
                    console.log('状态:', statusData.data?.status);
                    
                    if (statusData.data && statusData.data.status === 'completed') {
                        // 步骤3: 获取消息
                        const msgRes = await fetch('/api/chat-messages', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: chatId, conversation_id: conversationId })
                        });
                        
                        const msgData = await msgRes.json();
                        
                        for (const msg of msgData.data) {
                            if (msg.role === 'assistant' && msg.type === 'answer' && msg.content) {
                                result = msg.content;
                                break;
                            }
                        }
                        break;
                    }
                }
                
                document.getElementById('loading')?.remove();
                
                if (result) {
                    addMessage(result);
                } else {
                    addMessage('⚠️ 分析超时了，请稍后重试。');
                }
                
            } catch (error) {
                console.error('错误:', error);
                document.getElementById('loading')?.remove();
                addMessage(`❌ 请求失败: ${error.message}`);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            await sendToAI(text);
        }
        
        // Modal控制
        function openModal(type) {
            document.getElementById('modal-' + type).classList.add('active');
        }
        
        function closeModal(type) {
            document.getElementById('modal-' + type).classList.remove('active');
        }
        
        // 纯利计算
        function calcProfit() {
            const shopName = document.getElementById('shop-name').value || '某门店';
            const revenue = document.getElementById('revenue').value;
            const cost = document.getElementById('cost').value;
            const costDetail = document.getElementById('cost-detail').value || '未详细说明';
            
            if (!revenue || !cost) {
                alert('请填写营业额和成本');
                return;
            }
            
            closeModal('profit');
            
            const prompt = `请帮我分析这家门店的纯利情况：

🏪 门店：${shopName}
📊 月营业额：${revenue}元
💸 月总成本：${cost}元
📋 成本结构：${costDetail}

请计算月纯利润和利润率，并给出详细的经营分析和建议。`;
            
            sendToAI(prompt);
        }
        
        // 菜品毛利
        function analyzeDish() {
            const dishName = document.getElementById('dish-name').value || '某菜品';
            const price = document.getElementById('dish-price').value;
            const dishCost = document.getElementById('dish-cost').value;
            const dishDesc = document.getElementById('dish-desc').value || '普通菜品';
            
            if (!price || !dishCost) {
                alert('请填写售价和成本');
                return;
            }
            
            closeModal('menu');
            
            const prompt = `请帮我分析这个菜品的毛利情况：

🍽️ 菜品：${dishName}
💰 售价：${price}元/份
📉 单份成本：${dishCost}元
📝 定位：${dishDesc}

请计算毛利率，并给出定价策略和优化建议。`;
            
            sendToAI(prompt);
        }
        
        // 新店测算
        function calcNewShop() {
            const bizType = document.getElementById('biz-type').value;
            const staffCount = document.getElementById('staff-count').value;
            const avgSalary = document.getElementById('avg-salary').value;
            const rent = document.getElementById('rent').value;
            const utilities = document.getElementById('utilities').value;
            const unitPrice = document.getElementById('unit-price').value;
            const deliveryRatio = document.getElementById('delivery-ratio').value;
            const dailyOrders = document.getElementById('daily-orders').value;
            const targetProfit = document.getElementById('target-profit').value;
            const hasFactory = document.getElementById('has-factory').value;
            
            if (!bizType || !unitPrice || !dailyOrders) {
                alert('请填写必填项（品类、客单价、日均订单）');
                return;
            }
            
            closeModal('newshop');
            
            const prompt = `请帮我做新店投资测算：

🏪 餐饮品类：${bizType}
👥 员工数量：${staffCount || '未填写'}人
💰 人均工资：${avgSalary || '未填写'}元/月
🏠 月租金：${rent || '未填写'}元
⚡ 水电杂费：${utilities || '未填写'}元/月
💵 客单价：${unitPrice}元
📱 外卖占比：${deliveryRatio || '0'}%
📦 日均订单：${dailyOrders}单
🎯 目标月利润：${targetProfit || '未填写'}元
🏭 运营模式：${hasFactory}

请：
1. 计算月固定成本（人工+租金+水电）
2. 计算月营业额和预估月利润
3. 如果填写了目标利润，反推需要达到的日均单量
4. 给出投资建议和回本周期预估`;

            sendToAI(prompt);
        }
    </script>
